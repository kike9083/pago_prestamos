<!DOCTYPE html>
<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Resumen de Préstamos</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#5b50e5", // Extracted purple color
                        "background-light": "#f3f4f6",
                        "background-dark": "#111827", // Dark slate/gray
                        "surface-dark": "#1f2937", // Lighter gray for cards
                        "surface-light": "#ffffff",
                        "text-light": "#1f2937",
                        "text-dark": "#f9fafb",
                        "secondary-text-dark": "#9ca3af",
                        "secondary-text-light": "#6b7280",
                        "success": "#10b981", // Green for paid amount
                        "accent-blue": "#3b82f6", // Blue for other numbers
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0.75rem",
                        'xl': "1rem",
                        '2xl': "1.5rem",
                    },
                },
            },
        };
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-text-light dark:text-text-dark antialiased min-h-screen transition-colors duration-300">
<div class="max-w-md mx-auto min-h-screen relative pb-6 px-4 pt-6">
<header class="flex items-center justify-between mb-8">
<div class="flex items-center gap-3">
<div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center shadow-lg shadow-primary/30">
<span class="text-white font-bold text-xl">G</span>
</div>
<h1 class="text-xl font-bold tracking-tight">Gestor de Préstamos</h1>
</div>
<div class="flex items-center gap-2">
<button class="p-2 rounded-lg bg-surface-light dark:bg-surface-dark text-secondary-text-light dark:text-secondary-text-dark hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors" onclick="document.documentElement.classList.toggle('dark')">
<span class="material-icons-round text-xl">light_mode</span>
</button>
<button class="p-2 rounded-lg bg-surface-light dark:bg-surface-dark text-secondary-text-light dark:text-secondary-text-dark hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
<span class="material-icons-round text-xl">logout</span>
</button>
</div>
</header>
<section class="mb-8">
<h2 class="text-xs font-semibold uppercase tracking-wider text-secondary-text-light dark:text-secondary-text-dark mb-4 pl-1">Resumen General</h2>
<div class="grid gap-4">
<div class="bg-surface-light dark:bg-surface-dark p-5 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700/50">
<p class="text-sm font-medium text-secondary-text-light dark:text-secondary-text-dark mb-1">Deuda Total Activa</p>
<p class="text-3xl font-bold text-text-light dark:text-white">$393.43</p>
</div>
<div class="bg-surface-light dark:bg-surface-dark p-5 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700/50">
<p class="text-sm font-medium text-secondary-text-light dark:text-secondary-text-dark mb-1">Capital Amortizado</p>
<p class="text-3xl font-bold text-success">$483.12</p>
</div>
<div class="bg-surface-light dark:bg-surface-dark p-5 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700/50">
<div class="flex justify-between items-end mb-2">
<p class="text-sm font-medium text-secondary-text-light dark:text-secondary-text-dark">Progreso Global</p>
<span class="text-primary font-bold text-lg">55%</span>
</div>
<div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-3 overflow-hidden">
<div class="bg-primary h-3 rounded-full relative" style="width: 55%">
<div class="absolute right-0 top-0 bottom-0 w-2 bg-white/30 blur-[2px]"></div>
</div>
</div>
</div>
</div>
</section>
<section>
<div class="flex items-center justify-between mb-4">
<h2 class="text-lg font-bold text-text-light dark:text-white">Mis Préstamos</h2>
<button class="bg-primary hover:bg-primary/90 text-white px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-1 shadow-lg shadow-primary/30 transition-all active:scale-95">
<span class="material-icons-round text-base">add_circle_outline</span>
                    Nuevo Préstamo
                </button>
</div>
<div class="bg-surface-light dark:bg-surface-dark p-6 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700/50 relative overflow-hidden group">
<div class="absolute top-0 right-0 p-4 opacity-10 pointer-events-none">
<span class="material-icons-round text-9xl text-primary transform translate-x-8 -translate-y-8">credit_card</span>
</div>
<div class="absolute top-5 right-5 bg-primary/10 dark:bg-primary/20 text-primary font-bold px-3 py-1 rounded-full text-xs">
                    55%
                </div>
<div class="relative z-10">
<div class="mb-5">
<h3 class="text-xl font-bold text-text-light dark:text-white mb-1">mokum</h3>
<p class="text-xs text-secondary-text-light dark:text-secondary-text-dark uppercase tracking-wide font-medium">$812.55 INICIAL</p>
</div>
<div class="mb-6">
<p class="text-sm text-secondary-text-light dark:text-secondary-text-dark mb-1">Saldo Pendiente</p>
<p class="text-3xl font-bold text-text-light dark:text-white tracking-tight">$365.53</p>
</div>
<div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2 mb-6 overflow-hidden">
<div class="bg-primary h-2 rounded-full" style="width: 55%"></div>
</div>
<div class="flex items-center justify-between pt-2 border-t border-gray-100 dark:border-gray-700">
<div class="flex items-center gap-1 text-secondary-text-light dark:text-secondary-text-dark">
<span class="material-icons-round text-base">percent</span>
<span class="text-xs font-medium">5% interés</span>
</div>
<a class="text-primary text-xs font-semibold hover:underline flex items-center gap-1" href="#">
                            Ver detalles
                            <span class="material-icons-round text-sm">arrow_forward</span>
</a>
</div>
</div>
</div>
<div class="h-20"></div>
</section>
<nav class="fixed bottom-0 left-0 w-full bg-surface-light dark:bg-surface-dark border-t border-gray-200 dark:border-gray-800 pb-safe pt-2 px-6 pb-4 z-50">
<div class="max-w-md mx-auto flex justify-between items-center">
<button class="flex flex-col items-center gap-1 text-primary">
<span class="material-icons-round">dashboard</span>
<span class="text-[10px] font-medium">Inicio</span>
</button>
<button class="flex flex-col items-center gap-1 text-secondary-text-light dark:text-secondary-text-dark hover:text-primary dark:hover:text-primary transition-colors">
<span class="material-icons-round">account_balance_wallet</span>
<span class="text-[10px] font-medium">Pagos</span>
</button>
<button class="flex flex-col items-center gap-1 text-secondary-text-light dark:text-secondary-text-dark hover:text-primary dark:hover:text-primary transition-colors">
<span class="material-icons-round">pie_chart</span>
<span class="text-[10px] font-medium">Reportes</span>
</button>
<button class="flex flex-col items-center gap-1 text-secondary-text-light dark:text-secondary-text-dark hover:text-primary dark:hover:text-primary transition-colors">
<span class="material-icons-round">settings</span>
<span class="text-[10px] font-medium">Ajustes</span>
</button>
</div>
</nav>
</div>
<script>
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>

</body></html>
