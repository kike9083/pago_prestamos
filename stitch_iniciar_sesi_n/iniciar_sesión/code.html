<!DOCTYPE html>
<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Gestor de Préstamos - Iniciar Sesión</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#544CEC", // Extracted purple from buttons
                        "background-light": "#F3F4F6", // Light gray for light mode
                        "background-dark": "#111827", // Dark blue-gray for dark mode
                        "card-light": "#FFFFFF",
                        "card-dark": "#1F2937",
                        "input-light": "#F9FAFB",
                        "input-dark": "#374151",
                        "text-light": "#111827",
                        "text-dark": "#F9FAFB",
                        "secondary-text-light": "#6B7280",
                        "secondary-text-dark": "#9CA3AF",
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0.75rem", // 12px
                    },
                },
            },
        };
    </script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center p-4 transition-colors duration-300">
<div class="w-full max-w-md">
<div class="text-center mb-8">
<h1 class="text-3xl font-bold text-primary mb-2">Gestor de Préstamos</h1>
<p class="text-secondary-text-light dark:text-secondary-text-dark text-sm">
                Controla tus finanzas, un pago a la vez.
            </p>
</div>
<div class="bg-card-light dark:bg-card-dark rounded-2xl shadow-xl p-6 sm:p-8 w-full transition-colors duration-300">
<div class="flex border-b border-gray-200 dark:border-gray-700 mb-6 relative">
<button class="flex-1 pb-3 text-center text-primary font-semibold border-b-2 border-primary focus:outline-none transition-colors duration-200">
                    Iniciar Sesión
                </button>
<button class="flex-1 pb-3 text-center text-secondary-text-light dark:text-secondary-text-dark hover:text-text-light dark:hover:text-text-dark font-medium focus:outline-none transition-colors duration-200">
                    Registrarse
                </button>
</div>
<form action="#" class="space-y-5" method="POST">
<div>
<label class="block text-sm font-medium text-text-light dark:text-text-dark mb-1" for="email">
                        Correo electrónico
                    </label>
<div class="relative rounded-md shadow-sm">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-icons text-gray-400 text-lg">email</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border-gray-300 dark:border-gray-600 rounded-lg bg-input-light dark:bg-input-dark text-text-light dark:text-text-dark placeholder-gray-400 dark:placeholder-gray-500 focus:ring-primary focus:border-primary sm:text-sm transition-colors duration-200" id="email" name="email" placeholder="tu@email.com" required="" type="email"/>
</div>
</div>
<div>
<label class="block text-sm font-medium text-text-light dark:text-text-dark mb-1" for="password">
                        Contraseña
                    </label>
<div class="relative rounded-md shadow-sm">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-icons text-gray-400 text-lg">lock</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border-gray-300 dark:border-gray-600 rounded-lg bg-input-light dark:bg-input-dark text-text-light dark:text-text-dark placeholder-gray-400 dark:placeholder-gray-500 focus:ring-primary focus:border-primary sm:text-sm transition-colors duration-200" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
<div class="flex justify-end mt-1">
<a class="text-xs font-medium text-primary hover:text-opacity-80 transition-colors" href="#">
                            ¿Olvidaste tu contraseña?
                        </a>
</div>
</div>
<div>
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-semibold text-white bg-primary hover:bg-opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all duration-200 transform active:scale-[0.98]" type="submit">
                        Iniciar Sesión
                    </button>
</div>
</form>
<div class="mt-6">
<div class="relative">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-gray-200 dark:border-gray-700"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-2 bg-card-light dark:bg-card-dark text-secondary-text-light dark:text-secondary-text-dark">
                            O continúa con
                        </span>
</div>
</div>
<div class="mt-6 grid grid-cols-2 gap-3">
<button class="w-full inline-flex justify-center py-2.5 px-4 border border-gray-300 dark:border-gray-600 rounded-lg shadow-sm bg-white dark:bg-input-dark text-sm font-medium text-text-light dark:text-text-dark hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors duration-200" type="button">
<svg aria-hidden="true" class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24">
<path d="M12.48 10.92v3.28h7.84c-.24 1.84-.853 3.187-1.787 4.133-1.147 1.147-2.933 2.4-6.053 2.4-4.827 0-8.6-3.893-8.6-8.72s3.773-8.72 8.6-8.72c2.6 0 4.507 1.027 5.907 2.347l2.307-2.307C18.747 1.44 16.133 0 12.48 0 5.867 0 .533 5.333.533 12S5.867 24 12.48 24c3.44 0 6.013-1.133 8.027-3.227 2.053-2.053 2.627-5.027 2.627-7.467 0-.747-.08-1.467-.187-2.187h-10.467z"></path>
</svg>
</button>
<button class="w-full inline-flex justify-center py-2.5 px-4 border border-gray-300 dark:border-gray-600 rounded-lg shadow-sm bg-white dark:bg-input-dark text-sm font-medium text-text-light dark:text-text-dark hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors duration-200" type="button">
<svg aria-hidden="true" class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24">
<path d="M16.318 13.714v5.484h9.078c-0.37 2.354-2.745 6.901-9.078 6.901-5.458 0-9.917-4.521-9.917-10.099s4.458-10.099 9.917-10.099c3.109 0 5.193 1.318 6.38 2.464l4.243-4.243c-2.719-2.553-6.246-4.099-10.623-4.099-8.775 0-15.922 7.122-15.922 15.902s7.147 15.902 15.922 15.902c13.194 0 16.545-12.825 15.618-18.156h-15.618z"></path>
<path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-.35-.16-1.07-.5-1.94-.5-.9 0-1.78.38-2.33.66-1.33.66-2.58.42-3.64-.69-2.3-2.4-2.8-6.6-.17-9.5 1.22-1.34 3.08-1.87 4.38-1.5 1.05.3 1.62.7 2.02.7.35 0 1.05-.5 2.1-.8 1.4-.4 3.1.2 4.15 1.7-.15.1-2.45 1.4-2.45 4.3 0 3.3 2.8 4.5 2.95 4.55-.05.25-.45 1.55-1.99 3.08zM12.03 7.25c-.15-2.2 1.7-4.15 3.7-4.25.15 2.25-1.9 4.3-3.7 4.25z"></path>
</svg>
</button>
</div>
</div>
</div>
<div class="text-center mt-6">
<p class="text-xs text-secondary-text-light dark:text-secondary-text-dark">
                © 2025 Gestor de Préstamos. Todos los derechos reservados.
            </p>
</div>
</div>
<div class="fixed bottom-4 right-4 z-50">
<button class="bg-gray-800 dark:bg-white text-white dark:text-gray-800 p-3 rounded-full shadow-lg hover:scale-110 transition-transform" onclick="document.documentElement.classList.toggle('dark')">
<span class="material-icons dark:hidden">dark_mode</span>
<span class="material-icons hidden dark:block">light_mode</span>
</button>
</div>

</body></html>
